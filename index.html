<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coating Inspection Master</title>
    <style>
        :root {
            --primary-blue: #2c5282;
            --border-color: #cbd5e0;
            --accent-yellow: #fff9db;
            --text-orange: #f08c00;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f3f5;
            display: flex; 
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Aligns content to the top */
            min-height: 100vh; 
            margin: 0; 
            padding: 20px 10px; /* Top padding for spacing from the browser edge */
        }

        .card {
            background: white;
            width: 100%;
            max-width: 350px; 
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e9ecef;
            text-align: center;
        }

        /* Top Selection Box */
        .mode-selector {
            margin-bottom: 25px;
            background: #e7f5ff;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #d0e7ff;
        }

        .mode-selector select {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 800;
            color: var(--primary-blue);
            text-align: center;
            cursor: pointer;
            outline: none;
        }

        /* Input Rows */
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            justify-content: center;
        }

        .input-group label {
            width: 65px; 
            font-weight: 800;
            color: #4a5568;
            font-size: 13px;
            text-align: right;
            margin-right: 15px;
        }

        select {
            width: 65%; /* 20% reduced width as requested */
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            outline: none;
            background-color: white;
            color: #2d3748;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--primary-blue);
        }

        /* Result Area */
        .result-box {
            margin-top: 25px;
            background-color: var(--accent-yellow);
            border: 2px solid #fab005;
            border-radius: 12px;
            padding: 20px;
        }

        .result-title {
            color: #718096;
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .result-value {
            color: var(--text-orange);
            font-size: 52px;
            font-weight: 900;
            margin: 0;
            line-height: 1;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            color: #a0aec0;
            font-size: 10px;
            letter-spacing: 1px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="mode-selector">

            <option value="drying">DRYING TIME</option>
            <option value="immersion">IMMERSION TIME</option>
        </select>
    </div>

    <!-- Inputs -->
    <div class="input-group">
        <label>PAINT</label>
        <select id="paintSelect" onchange="calculate()"></select>
    </div>

    <div class="input-group">
        <label>TEMP</label>
        <select id="tempSelect" onchange="calculate()"></select>
    </div>

    <div class="input-group">
        <label>WORK</label>
        <select id="typeSelect" onchange="calculate()"></select>
    </div>

    <!-- Output -->
    <div class="result-box">
        <div id="resultLabel" class="result-title">RESULT</div>
        <div class="result-value" id="resultDisplay">-</div>
    </div>

    <div class="footer">COATING INSPECTION ASSISTANT</div>
</div>

    function initMode() {
        const mode = document.getElementById('mainMode').value;
        const paintSel = document.getElementById('paintSelect');
        const tempSel = document.getElementById('tempSelect');
        const typeSel = document.getElementById('typeSelect');

        paintSel.innerHTML = ""; tempSel.innerHTML = ""; typeSel.innerHTML = "";

        if (mode === 'drying') {
            Object.keys(dryingData.values).sort().forEach(p => paintSel.add(new Option(p, p)));
            dryingData.temps.forEach(t => tempSel.add(new Option(t + "°C", t)));
            dryingData.works.forEach(w => typeSel.add(new Option(w, w)));
        } else {
            Object.keys(immersionData.values).forEach(p => paintSel.add(new Option(p, p)));
            immersionData.temps.forEach(t => tempSel.add(new Option(t, t)));
            immersionData.works.forEach(w => typeSel.add(new Option(w, w)));
        }
        calculate();
    }

    function calculate() {
        const mode = document.getElementById('mainMode').value;
        const paint = document.getElementById('paintSelect').value;
        const temp = document.getElementById('tempSelect').value;
        const type = document.getElementById('typeSelect').value;
        const display = document.getElementById('resultDisplay');
        const label = document.getElementById('resultLabel');

        label.innerText = type + " TIME";

        if (mode === 'drying') {
            const typeKey = type === "Dry to Touch" ? "t" : (type === "Possible to Access" ? "a" : "h");
            display.innerText = (dryingData.values[paint] && dryingData.values[paint][typeKey]) ? dryingData.values[paint][typeKey][temp] : "-";
        } else {
            display.innerText = immersionData.values[paint][type][immersionData.temps.indexOf(temp)] || "-";
        }
        display.style.color = (display.innerText === "N/A" || display.innerText === "-") ? "#bdc3c7" : "#f08c00";
    }

    window.onload = initMode;
</script>
