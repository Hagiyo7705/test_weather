<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Hygrometer Calculator – Photo Save</title>
<meta name="theme-color" content="#0f172a" />
<style>
  /* Universal box-sizing for consistent layout */
  *, *::before, *::after {
    box-sizing: border-box;
  }

  :root{
    /* Dark Mode Colors (Default) */
    --bg:#0f172a;
    --panel:#0b1020;
    --border:#1f2937;
    --text:#e5e7eb;
    --muted:#94a3b8;
    --cool:#3b82f6;
    --danger:#ef4444;
    --shadow:0 0px 10px rgba(0,0,0,.25);
  }

  /* Light Mode Colors */
  body.light-theme {
    --bg:#f8fafc;
    --panel:#ffffff;
    --border:#e2e8f0;
    --text:#1e293b;
    --muted:#64748b;
    --cool:#2563eb;
    --danger:#dc2626;
  }

  html,body{height:100%}
  body{
    margin:0;
    background:linear-gradient(180deg,var(--panel),var(--bg) 40%,var(--panel));
    color:var(--text);
    font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  .container{ max-width:480px; margin:0 auto; padding:16px 12px 24px; }
  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow);
    padding:14px;
    margin-bottom: 0px;
    transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .title{font-weight:800; letter-spacing:.2px; font-size: 1.25em;}
  label{display:block; font-size: 0.9em; color:var(--muted); margin-bottom:6px}
  .input{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 12px;
    width: auto;
    transition: background-color 0.3s ease, border-color 0.3s ease;
  }
  .input input, .input .value {
    flex-grow: 1;
    min-width: 0;
    border:none;
    outline:none;
    background:transparent;
    color:var(--text);
    font-size:1.15em;
    font-variant-numeric:tabular-nums;
    line-height:1.2;
    text-align: center;
  }
  .input .value {
    font-weight: normal;
  }
  .unit-badge{
    flex-shrink: 0;
    font-size: 0.9em;
    color:var(--muted);
  }
  .two-column-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: flex-start;
  }
  .input-column, .result-column {
      display: flex;
      flex-direction: column;
      gap: 10px;
  }
  .column-title {
    font-size: 1.15em;
    font-weight: 800;
    color: #cbd5e1;
    text-align: center;
    margin-bottom: 5px;
  }
  body.light-theme .column-title { color: var(--text); }
  .two-column-layout .input-row-item, .two-column-layout .result-row-item {
      display: grid;
      grid-template-columns: auto 100px;
      gap: 8px;
      align-items: center;
  }
  .two-column-layout .input-row-item label, .two-column-layout .result-row-item .result-label-col {
      margin-bottom: 0;
      font-size: 1.15em;
      text-align: center;
  }
  #deltat { font-size: 1.275em; font-weight: bold; }
  .contact-email { text-align: right; color: var(--muted); font-size: 0.85em; width: 100%; margin-top: 10px;}
  .button-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1.2fr;
    grid-template-rows: auto auto;
    gap: 10px;
    align-items: stretch;
    margin-top: 10px;
  }
  .btn{
    appearance:none; border:1px solid var(--border); background:var(--bg);
    color:var(--text);
    padding:12px 14px; border-radius:12px; font-weight:700; width:100%; box-shadow:var(--shadow); font-size: 1em;
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  .btn:active{transform:translateY(1px)}
  .button-grid #btnSaveData { grid-column: 1 / 2; grid-row: 1 / 2; }
  .button-grid #btnShare { grid-column: 2 / 3; grid-row: 1 / 2; }
  .button-grid #btnToggleTheme { grid-column: 1 / 2; grid-row: 2 / 3; }
  .button-grid .unit-toggle {
    grid-column: 2 / 3;
    grid-row: 2 / 3;
    display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border); padding: 4px; border-radius: 999px;
  }
  .button-grid #btnClear { grid-column: 3 / 4; grid-row: 1 / 3; }
  .unit-toggle button{
    flex:1; background: transparent; border: none; color: var(--muted); padding: 8px; border-radius: 999px; font-weight: 800;
  }
  .unit-toggle button.active{ background:var(--border); color:var(--text) }

  #memo-section .memo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
  }
  .memo-label { font-weight: 700; font-size: 1.15em; color: var(--text); }
  .memo-datetime-display { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 1.15em; font-weight: bold; }
  .memo-input-container .input input { text-align: left; }

  .photo-grid-container { display: flex; gap: 10px; margin: 14px; }
  .photo-container {
      flex: 1; height: 150px; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      border: 2px dashed var(--border); border-radius: 12px; cursor: pointer;
  }
  .photo-container .photo-placeholder-text {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: var(--muted); font-size: 1.2em; font-weight: 700; pointer-events: none; z-index: 1;
  }
  .photo-container img { max-width: 100%; max-height: 100%; object-fit: cover; display: none; }
  .risk { color: var(--danger) !important; }
  .cool { color: var(--cool) !important; }
  .deltat-note { text-align: center; font-size: 0.8em; color: var(--muted); margin-top: 10px; }
</style>
</head>
<body>
  <main class="container">
    <!-- Memo -->
    <section class="card" id="memo-section">
      <div class="memo-header">
        <div class="memo-label">Memo</div>
        <div class="memo-datetime-display" id="memo-datetime">—</div>
      </div>
      <div class="memo-input-container">
        <div class="input">
          <input id="memo" maxlength="20" placeholder="Enter memo" />
        </div>
      </div>
    </section>

    <!-- Combined Input & Result Section -->
    <section class="card" id="combined-section" style="margin-top:10px">
        <div class="two-column-layout">
            <div class="input-column">
                <div class="column-title">INPUT</div>
                <div class="input-row-item"><label>D.B</label><div class="input"><input id="dry" inputmode="decimal" /><span class="unit-badge" id="u1">°C</span></div></div>
                <div class="input-row-item"><label>W.B</label><div class="input"><input id="wet" inputmode="decimal" /><span class="unit-badge" id="u2">°C</span></div></div>
                <div class="input-row-item"><label>S/T</label><div class="input"><input id="surf" inputmode="decimal" /><span class="unit-badge" id="u3">°C</span></div></div>
            </div>
            <div class="result-column">
                <div class="column-title">RESULT</div>
                <div class="result-row-item"><div class="result-label-col">RH</div><div class="input"><div class="value" id="rh">—</div><span class="unit-badge">%</span></div></div>
                <div class="result-row-item"><div class="result-label-col">DP</div><div class="input"><div class="value" id="dp">—</div><span class="unit-badge" id="dp-unit-badge">°C</span></div></div>
                <div class="result-row-item"><div class="result-label-col">ΔT</div><div class="input"><div class="value" id="deltat">—</div><span class="unit-badge" id="deltat-unit-badge">°C</span></div></div>
            </div>
        </div>
        <div class="deltat-note">Rule: ΔT &lt; 3°C/5°F → <b class="risk">Danger</b>, ≥ 3°C/5°F → <b class="cool">Suitable</b></div>
    </section>
    
    <!-- Photo Section -->
    <section class="card photo-section" id="photo-section" style="margin-top:10px;">
        <div class="photo-grid-container">
            <div class="photo-container" id="photo-container-1">
                <input type="file" id="photo-input-1" accept="image/*" capture="camera" style="display:none;" />
                <img id="captured-photo-1" src="" />
                <div class="photo-placeholder-text" id="photo-placeholder-text-1">Photo</div>
            </div>
            <div class="photo-container" id="photo-container-2">
                <input type="file" id="photo-input-2" accept="image/*" capture="camera" style="display:none;" />
                <img id="captured-photo-2" src="" />
                <div class="photo-placeholder-text" id="photo-placeholder-text-2">Photo</div>
            </div>
        </div>
    </section>

    <!-- Action Buttons -->
    <section class="card" style="margin-top:10px;">
      <div class="button-grid">
        <button class="btn" id="btnSaveData">Save CSV</button>
        <button class="btn" id="btnShare">Share IMG</button>
        <button class="btn" id="btnToggleTheme"><span id="themeText">Light Mode</span></button>
        <div class="unit-toggle">
          <button id="btnC" class="active">°C</button>
          <button id="btnF">°F</button>
        </div>
        <button class="btn" id="btnClear">Clear All</button>
      </div>
      <div class="contact-email">hagiyo7705@gmail.com</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const el = id => document.getElementById(id);
    const toNum = v => {
      if (!v) return null;
      const n = Number(String(v).replace(",", "."));
      return Number.isFinite(n) ? n : null;
    };
    const fmt = n => (n === null || Number.isNaN(n) ? "—" : n.toFixed(1));
    const ts = () => {
      const d = new Date();
      const p = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    };
    const filenameTs = () => {
      const d = new Date();
      const p = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}`;
    };

    let unit = "C";
    let capturedPhotoUrl1 = null;
    let capturedPhotoUrl2 = null;

    // Psychrometrics logic
    const es = (T)=> 6.112 * Math.exp((17.62 * T) / (243.12 + T));
    const invMagnus = (e)=> (243.12 * Math.log(e/6.112)) / (17.62 - Math.log(e/6.112));
    function rhFromDryWet(Td, Tw){
      const gamma = 0.00066 * (1 + 0.00115 * Tw) * 101.325;
      const e_act = (es(Tw) * 0.1) - gamma * (Td - Tw);
      const e_sat = es(Td) * 0.1;
      return Math.max(0, Math.min(100, (e_act / e_sat) * 100));
    }
    const CtoF = c => c * 9/5 + 32;
    const FtoC = f => (f - 32) * 5/9;

    function recalc(){
      const dry = toNum(el("dry").value);
      const wet = toNum(el("wet").value);
      const surf = toNum(el("surf").value);
      const Td = unit==="C" ? dry : (dry!==null ? FtoC(dry) : null);
      const Tw = unit==="C" ? wet : (wet!==null ? FtoC(wet) : null);
      const Ts = unit==="C" ? surf: (surf!==null? FtoC(surf): null);

      if(Td===null || Tw===null){
        el("rh").textContent = "—"; el("dp").textContent = "—"; el("deltat").textContent = "—";
        return;
      }
      const RH = rhFromDryWet(Td, Tw);
      const DPc = invMagnus((RH/100) * es(Td));
      const DP = unit==="C" ? DPc : CtoF(DPc);
      const DT = (Ts===null) ? null : (unit==="C" ? (Ts - DPc) : (CtoF(Ts) - CtoF(DPc)));

      el("rh").textContent = RH.toFixed(0);
      el("dp").textContent = fmt(DP);
      if(DT!==null){
        el("deltat").textContent = fmt(DT);
        el("deltat").className = "value " + (DT < (unit==="C"?3:5) ? "risk" : "cool");
      }
    }

    function setUnit(next){
      if(unit===next) return;
      ["dry","wet","surf"].forEach(id => {
        const v = toNum(el(id).value);
        if(v!==null) el(id).value = fmt(next==="F" ? CtoF(v) : FtoC(v));
      });
      unit = next;
      document.querySelectorAll(".unit-badge").forEach(b => {
        if(b.textContent.includes("°")) b.textContent = `°${unit}`;
      });
      el("btnC").classList.toggle("active", unit==="C");
      el("btnF").classList.toggle("active", unit==="F");
      recalc();
    }

    // New: Save captured photo to gallery (download)
    function saveImageFile(file) {
        const memoValue = el("memo").value.trim() || "Photo";
        const dateStr = filenameTs();
        const extension = file.name.split('.').pop() || 'jpg';
        const fileName = `${memoValue}_${dateStr}.${extension}`;

        const link = document.createElement('a');
        link.href = URL.createObjectURL(file);
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function handlePhotoInput(inputIdx) {
        const input = el(`photo-input-${inputIdx}`);
        const img = el(`captured-photo-${inputIdx}`);
        const placeholder = el(`photo-placeholder-text-${inputIdx}`);
        
        input.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
                // 1. Show in HTML
                const url = URL.createObjectURL(file);
                img.src = url;
                img.style.display = 'block';
                placeholder.style.display = 'none';
                
                // 2. Save to Gallery (Download)
                saveImageFile(file);
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
      ["dry","wet","surf","memo"].forEach(id=> el(id).addEventListener("input", recalc));
      el("btnC").onclick = () => setUnit("C");
      el("btnF").onclick = () => setUnit("F");
      el("btnClear").onclick = () => {
          ["dry","wet","surf","memo"].forEach(id=>el(id).value="");
          el("captured-photo-1").style.display='none';
          el("captured-photo-2").style.display='none';
          el("photo-placeholder-text-1").style.display='block';
          el("photo-placeholder-text-2").style.display='block';
          recalc();
      };
      
      el("btnToggleTheme").onclick = () => {
          document.body.classList.toggle("light-theme");
          const isLight = document.body.classList.contains("light-theme");
          el("themeText").textContent = isLight ? "Dark Mode" : "Light Mode";
      };

      // Photo click triggers
      el("photo-container-1").onclick = () => el("photo-input-1").click();
      el("photo-container-2").onclick = () => el("photo-input-2").click();
      
      handlePhotoInput(1);
      handlePhotoInput(2);

      setInterval(() => { el("memo-datetime").textContent = ts(); }, 1000);
      el("memo-datetime").textContent = ts();
    });
  </script>
</body>
</html>
