<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 기기 최적화를 위한 뷰포트 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이슬점 계산기</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; padding: 20px; border: 1px solid #ddd; border-radius: 12px; background: #f9f9f9; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 15px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; margin-top: 25px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:active { background: #0056b3; }
        #result { margin-top: 25px; padding: 15px; text-align: center; font-size: 20px; color: #007bff; background: #e7f1ff; border-radius: 8px; min-height: 24px; }
    </style>
</head>
<body>

<div class="container">
    <h2>이슬점 계산기</h2>
    <label>건구 온도 (°C)</label>
    <input type="number" id="temp" step="0.1" inputmode="decimal" placeholder="예: 25">
    
    <label>상대 습도 (%)</label>
    <input type="number" id="humidity" step="0.1" inputmode="decimal" placeholder="예: 60">
    
    <button onclick="calculateDewPoint()">결과 확인</button>
    
    <div id="result">수치를 입력하세요</div>
</div>

<script>
    function calculateDewPoint() {
        const T = parseFloat(document.getElementById('temp').value);
        const RH = parseFloat(document.getElementById('humidity').value);
        const resultDiv = document.getElementById('result');

        if (isNaN(T) || isNaN(RH)) {
            resultDiv.innerText = "올바른 숫자를 입력해주세요.";
            return;
        }

        const a = 17.625;
        const b = 243.04;
        const alpha = Math.log(RH / 100) + ((a * T) / (b + T));
        const dewPoint = (b * alpha) / (a - alpha);

        resultDiv.innerText = `이슬점: ${dewPoint.toFixed(1)}°C`;
    }
</script>

</body>
</html>
