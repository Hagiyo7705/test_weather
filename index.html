<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coating Inspection Master</title>
    <style>
        :root {
            --primary-blue: #2c5282;
            --border-color: #cbd5e0;
            --accent-yellow: #fff9db;
            --text-orange: #f08c00;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f3f5;
            display: flex; 
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh; 
            margin: 0; 
            padding: 20px 10px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 350px; 
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e9ecef;
            text-align: center;
        }

        .mode-selector {
            margin-bottom: 25px;
            background: #e7f5ff;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #d0e7ff;
        }

        .mode-selector select {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 800;
            color: var(--primary-blue);
            text-align: center;
            cursor: pointer;
            outline: none;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            justify-content: center;
        }

        .input-group label {
            width: 65px; 
            font-weight: 800;
            color: #4a5568;
            font-size: 13px;
            text-align: right;
            margin-right: 15px;
        }

        select {
            width: 65%; 
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            outline: none;
            background-color: white;
            color: #2d3748;
            text-align: center;
        }

        .result-box {
            margin-top: 25px;
            background-color: var(--accent-yellow);
            border: 2px solid #fab005;
            border-radius: 12px;
            padding: 20px;
        }

        .result-title {
            color: #718096;
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .result-value {
            color: var(--text-orange);
            font-size: 52px;
            font-weight: 900;
            margin: 0;
            line-height: 1;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            color: #a0aec0;
            font-size: 10px;
            letter-spacing: 1px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="mode-selector">
        <select id="mainMode" onchange="initMode()">
            <option value="drying">DRYING TIME</option>
            <option value="immersion">IMMERSION TIME</option>
        </select>
    </div>

    <div class="input-group">
        <label>PAINT</label>
        <select id="paintSelect" onchange="calculate()"></select>
    </div>

    <div class="input-group">
        <label>TEMP</label>
        <select id="tempSelect" onchange="calculate()"></select>
    </div>

    <div class="input-group">
        <label>WORK</label>
        <select id="typeSelect" onchange="calculate()"></select>
    </div>

    <div class="result-box">
        <div id="resultLabel" class="result-title">RESULT</div>
        <div class="result-value" id="resultDisplay">-</div>
    </div>

    <div class="footer">COATING INSPECTION ASSISTANT</div>
</div>

<script>
    const immersionData = {
        temps: ["-5°C", "0°C", "5°C", "10°C", "15°C", "20°C", "25°C", "30°C", "35°C", "40°C"],
        works: ["Body Ct", "Touch up", "Minor T/up"],
        values: {
            "Intershield 300HS": {
                "Body Ct": ["5D", "4D", "3D", "3D", "3D", "2.5D", "2D", "2D", "1.5D", "1.5D"],
                "Touch up": ["4D", "3D", "2D", "2D", "2D", "1.5D", "1.5D", "1D", "1D", "1D"],
                "Minor T/up": ["2D", "1.5D", "1D", "1D", "1D", "1D", "1D", "12H", "12H", "12H"]
            },
            "Intersmooth 100HS": {
                "Body Ct": ["36H", "24H", "18H", "16H", "16H", "15H", "13H", "12H", "11H", "10H"],
                "Touch up": ["24H", "18H", "14H", "10H", "10H", "10H", "9H", "9H", "9H", "8H"],
                "Minor T/up": ["N/A", "N/A", "N/A", "N/A", "N/A", "N/A", "N/A", "N/A", "N/A", "N/A"]
            }
        }
    };

    // Updated with 30°C data from the image
    const dryingData = {
        temps: ["40", "35", "30", "25", "20", "15", "10", "5", "0", "-5"],
        works: ["Dry to Touch", "Possible to Access", "Dry to Hard"],
        values: {
            "Interfine 2080": { t:{"30":"2H"}, a:{"30":"16H"}, h:{"30":"16H"} },
            "Intergard 9600": { t:{"30":"4.5H"}, a:{"30":"7H"}, h:{"30":"7H"} },
            "Intersmooth 7465HS": { t:{"30":"35m"}, a:{"30":"N/A"}, h:{"30":"N/A"} },
            "Interthane 990E": { t:{"30":"0.3H"}, a:{"30":"5H"}, h:{"30":"5H"} },
            "Intercept 7000": { t:{"30":"2H"}, a:{"30":"N/A"}, h:{"30":"N/A"} },
            "Intercept 8500 LPP": { t:{"30":"45m"}, a:{"30":"N/A"}, h:{"30":"45m"} },
            "Intergard 343HS": { t:{"30":"1H"}, a:{"30":"2.5H"}, h:{"30":"2.5H"} },
            "Intergard 361": { t:{"30":"4H"}, a:{"30":"7H"}, h:{"30":"7H"} },
            "Intergard 5263": { t:{"30":"5H"}, a:{"30":"14H"}, h:{"30":"14H"} },
            "Intergard 5555": { t:{"30":"3H"}, a:{"30":"10H"}, h:{"30":"10H"} },
            "Intergard 740HS": { t:{"30":"4H"}, a:{"30":"10H"}, h:{"30":"10H"} },
            "Intergard 7500": { t:{"30":"1H"}, a:{"30":"2.5H"}, h:{"30":"2.5H"} },
            "Intergard 7500HS": { t:{"30":"2H"}, a:{"30":"5H"}, h:{"30":"5H"} },
            "Interlac 665": { t:{"30":"2H"}, a:{"30":"12H"}, h:{"30":"12H"} },
            "Interline 605": { t:{"30":"20m"}, a:{"30":"2H"}, h:{"30":"2H"} },
            "Interline 982": { t:{"30":"1H"}, a:{"30":"N/A"}, h:{"30":"N/A"} },
            "Interline 994": { t:{"30":"2.5H"}, a:{"30":"4H"}, h:{"30":"4H"} },
            "Interline 994(LT)": { t:{"30":"1H"}, a:{"30":"3H"}, h:{"30":"3H"} },
            "Interprime 198NB": { t:{"30":"1H"}, a:{"30":"3H"}, h:{"30":"3H"} },
            "Intersflex 8700 SPC": { t:{"30":"35m"}, a:{"30":"N/A"}, h:{"30":"N/A"} },
            "Intershield 300": { t:{"30":"2.5H"}, a:{"30":"4H"}, h:{"30":"4H"} },
            "Intershield 300HS": { t:{"30":"1.5H"}, a:{"30":"3H"}, h:{"30":"3H"} },
            "Intersleek 1100SR": { t:{"30":"1.5H"}, a:{"30":"3H"}, h:{"30":"3H"} },
            "Intersleek 717": { t:{"30":"20m"}, a:{"30":"2.5H"}, h:{"30":"2.5H"} },
            "Intersleek 737": { t:{"30":"1.5H"}, a:{"30":"4H"}, h:{"30":"4H"} },
            "Intersmooth 7465Si": { t:{"30":"35m"}, a:{"30":"N/A"}, h:{"30":"N/A"} },
            "Intersmooth 7475Si": { t:{"30":"35m"}, a:{"30":"N/A"}, h:{"30":"N/A"} },
            "Interswift 6800HS": { t:{"30":"2H"}, a:{"30":"N/A"}, h:{"30":"N/A"} },
            "Interswift 6900Si": { t:{"30":"1.5H"}, a:{"30":"N/A"}, h:{"30":"N/A"} },
            "Interzone 1000": { t:{"30":"2.5H"}, a:{"30":"6H"}, h:{"30":"6H"} }
        }
    };

    function initMode() {
        const mode = document.getElementById('mainMode').value;
        const paintSel = document.getElementById('paintSelect');
        const tempSel = document.getElementById('tempSelect');
        const typeSel = document.getElementById('typeSelect');

        paintSel.innerHTML = ""; tempSel.innerHTML = ""; typeSel.innerHTML = "";

        if (mode === 'drying') {
            Object.keys(dryingData.values).sort().forEach(p => paintSel.add(new Option(p, p)));
            dryingData.temps.forEach(t => tempSel.add(new Option(t + "°C", t)));
            dryingData.works.forEach(w => typeSel.add(new Option(w, w)));
        } else {
            Object.keys(immersionData.values).forEach(p => paintSel.add(new Option(p, p)));
            immersionData.temps.forEach(t => tempSel.add(new Option(t, t)));
            immersionData.works.forEach(w => typeSel.add(new Option(w, w)));
        }
        calculate();
    }

    function calculate() {
        const mode = document.getElementById('mainMode').value;
        const paint = document.getElementById('paintSelect').value;
        const temp = document.getElementById('tempSelect').value;
        const type = document.getElementById('typeSelect').value;
        const display = document.getElementById('resultDisplay');
        const label = document.getElementById('resultLabel');

        label.innerText = type + " TIME";

        if (mode === 'drying') {
            const typeKey = type === "Dry to Touch" ? "t" : (type === "Possible to Access" ? "a" : "h");
            const tempVal = temp.replace("°C", "");
            display.innerText = (dryingData.values[paint] && dryingData.values[paint][typeKey]) ? (dryingData.values[paint][typeKey][tempVal] || "-") : "-";
        } else {
            display.innerText = immersionData.values[paint][type][immersionData.temps.indexOf(temp)] || "-";
        }
        display.style.color = (display.innerText === "N/A" || display.innerText === "-") ? "#bdc3c7" : "#f08c00";
    }

    window.onload = initMode;
</script>

</body>
</html>
