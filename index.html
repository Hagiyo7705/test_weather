<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이슬점 계산기</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 400px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>이슬점 계산기</h2>
    <label>건구 온도 (°C):</label>
    <input type="number" id="temp" step="0.1" placeholder="예: 25">
    
    <label>상대 습도 (%):</label>
    <input type="number" id="humidity" step="0.1" placeholder="예: 60">
    
    <button onclick="calculateDewPoint()">계산하기</button>
    
    <div id="result"></div>
</div>

<script>
    function calculateDewPoint() {
        const T = parseFloat(document.getElementById('temp').value);
        const RH = parseFloat(document.getElementById('humidity').value);

        if (isNaN(T) || isNaN(RH)) {
            document.getElementById('result').innerText = "값을 올바르게 입력해주세요.";
            return;
        }

        // Magnus 공식 상수
        const a = 17.625;
        const b = 243.04;

        // 알파 계산
        const alpha = Math.log(RH / 100) + ((a * T) / (b + T));
        
        // 이슬점 계산
        const dewPoint = (b * alpha) / (a - alpha);

        document.getElementById('result').innerText = `계산된 이슬점: ${dewPoint.toFixed(2)}°C`;
    }
</script>

</body>
</html>
